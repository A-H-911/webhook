name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/WebhookService.UnitTests/ --no-build --configuration Release --settings tests/coverlet.runsettings --logger "trx;LogFileName=unit-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Integration tests (Docker via Testcontainers)
        run: dotnet test tests/WebhookService.IntegrationTests/ --no-build --configuration Release --settings tests/coverlet.runsettings --logger "trx;LogFileName=integration-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/webhook-spa/package-lock.json

      - name: Install dependencies
        working-directory: frontend/webhook-spa
        run: npm ci

      - name: Build
        working-directory: frontend/webhook-spa
        run: npm run build

      - name: Unit tests with coverage
        working-directory: frontend/webhook-spa
        run: npm test -- --watch=false --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/webhook-spa/coverage/

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Prepare .env with generated AUTH_PASSWORD_HASH
        env:
          E2E_AUTH_PASSWORD: AdminPass123!
        run: |
          cat > .env <<'EOF'
          SA_PASSWORD=Local!Dev_Sa_Pw_123
          WEBHOOK_BASE_URL=http://localhost:8088
          RETENTION_DAYS=7
          MAX_REQUEST_SIZE_MB=5
          AUTH_USERNAME=admin
          AUTH_SESSION_HOURS=8
          EOF
          dotnet run --project tools/RotatePassword -- --password "$E2E_AUTH_PASSWORD"
          echo "Generated .env (hash redacted):"
          grep -v '^AUTH_PASSWORD_HASH=' .env

      - name: Start stack and wait for health
        run: bash scripts/rebuild-and-wait.sh
        env:
          REBUILD_TIMEOUT_SECONDS: 180

      - name: Install Playwright browsers
        run: pwsh tests/WebhookService.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: dotnet test tests/WebhookService.E2ETests/ --no-build --configuration Release --logger "trx;LogFileName=e2e-results.trx" --results-directory ./TestResults
        env:
          E2E_BASE_URL: http://localhost:8088
          E2E_AUTH_USERNAME: admin
          E2E_AUTH_PASSWORD: AdminPass123!
          SA_PASSWORD: Local!Dev_Sa_Pw_123

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200 sqlserver api stream-worker jobs-worker || true

      - name: Upload test results and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            TestResults/
            tests/WebhookService.E2ETests/bin/Release/net10.0/playwright-traces/
