server {
    listen 80;
    client_max_body_size 10m;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff"                   always;
    add_header X-Frame-Options         "DENY"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"             always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_scheme;

    location ~ ^/api/tokens/[^/]+/sse$ {
        proxy_pass                 http://api:8080;
        proxy_http_version         1.1;
        proxy_set_header           Host              $host;
        proxy_set_header           X-Real-IP         $remote_addr;
        proxy_set_header           X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header           X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header           Connection        "";
        proxy_buffering            off;
        proxy_cache                off;
        chunked_transfer_encoding  on;
        proxy_read_timeout         3600s;
    }

    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
    }

    location /webhook/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_pass http://api:8080;
    }

    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
