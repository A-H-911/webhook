# Usage: docker compose -f docker-compose.yml -f docker-compose.ngrok.yml up -d
#
# Required in .env:
#   NGROK_AUTHTOKEN=<your_token>
#   NGROK_DOMAIN=twk-webhook-unifonic.ngrok.app
#   HOOKBIN_BASE_URL=https://${NGROK_DOMAIN}
#
# HOOKBIN_BASE_URL is set in .env and flows to the api service through the existing
# Hookbin__BaseUrl binding in docker-compose.yml — no override is needed in this file.

services:
  ngrok:
    image: ngrok/ngrok:latest
    command: >
      http
      --domain=${NGROK_DOMAIN}
      frontend:80
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    depends_on:
      - frontend
    networks:
      - hookbin-net
    ports:
      - "127.0.0.1:4041:4040"
    restart: unless-stopped

networks:
  hookbin-net:
